<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Sleep Screen Text for CrossPoint Devices</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta charset="UTF-8">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Bitter:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Sour+Gummy:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet">

        <link rel="stylesheet" href="crosspoint.css">
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <header>
            <h1>📝 Sleep Screen Text for CrossPoint Devices</h1>

            <p>Save the generated file to the root of your SD card. Make sure it's named <code>sleep.bmp</code>.</p>
        </header>

        <div class="font-loader">
            <!--  force fonts to load before canvas starts drawing  -->
            <span style="font-family: 'Sour Gummy'">Sour Gummy</span>
            <span style="font-family: 'Bitter'">Bitter</span>
        </div>
        
        <main>
            <div class="render-wrapper">
                <canvas id="render"></canvas>
            </div>
            <form id="options">
                <fieldset class="opts-device card">
                    <legend>Device</legend>
                    <div class="setting-row setting-radio-group">
                        <label class="setting-radio-option">
                            <input type="radio" name="device" value="x3" checked>
                            <span class="custom-radio-indicator"></span>
                            <span class="setting-name">X3</span>
                        </label>
                        <label class="setting-radio-option">
                            <input type="radio" name="device" value="x4">
                            <span class="custom-radio-indicator"></span>
                            <span class="setting-name">X4</span>
                        </label>
                    </div>
                </fieldset>

                <fieldset class="opts-layout card">
                    <legend>Layout</legend>
                    <label class="setting-row">
                        <span class="setting-name">Invert Colors</span>
                        <span class="toggle-switch">
                            <input type="checkbox" name="invert-colors">
                            <span class="toggle-slider"></span>
                        </span>
                    </label>
                
                    <label class="setting-row">
                        <span class="setting-name">Left and Right Gutters (px)</span>
                        <span class="setting-control">
                            <input type="number" name="h-padding" value="30">
                        </span>
                    </label>
                
                    <label class="setting-row">
                        <span class="setting-name">Top Gutter (px)</span>
                        <span class="setting-control">
                            <input type="number" name="v-padding" value="50">
                        </span>
                    </label>
                </fieldset>
            
                <fieldset class="opts-heading card">
                    <legend>Heading</legend>
            
                    <label class="setting-row">
                        <span class="setting-name">Heading Size (px)</span>
                        <span class="setting-control">
                            <input type="number" name="heading-size" value="48">
                        </span>
                    </label>
            
                    <label class="setting-row">
                        <span class="setting-name">Heading Text</span>
                        <span class="setting-control">
                            <input type="text" name="heading-text">
                        </span>
                    </label>
            
                    <label class="setting-row">
                        <span class="setting-name">Gap Below Header (px)</span>
                        <span class="setting-control">
                            <input type="number" name="gap-size" value="40">
                        </span>
                    </label>
                </fieldset>
            
                <fieldset class="opts-body card">
                    <legend>Body Text</legend>
            
                    <label class="setting-row">
                        <span class="setting-name">Body Text Size (px)</span>
                        <span class="setting-control">
                            <input type="number" name="body-size" value="32">
                        </span>
                    </label>
            
                    <label class="setting-row">
                        <span class="setting-name">Body Line Height</span>
                        <span class="setting-control">
                            <input type="number" name="body-ln" value="1.6">
                        </span>
                    </label>
            
                    <label class="setting-row">
                        <span class="setting-name">
                            Indent Size (px)
                            <span class="setting-desc">Use negative number for hanging indent</span>
                        </span>
                        <span class="setting-control">
                            <input type="number" name="body-indent" value="-35">
                        </span>
                    </label>
            
                    <label class="setting-row">
                        <span class="setting-name">Body Text</span>
                        <span class="setting-control setting-control-textarea">
                            <textarea name="body-text">
&#9744; Some task
&#9744; Some other task
&#9744; Oh my god you have so many tasks
&#9746; Make a dumb web utility
&#9744; Now with word wrap and hanging indentation: Lorem ipsum dolor sit amet, consectetur adipiscing elit. etc etc
                            </textarea>
                        </span>
                    </label>
                </fieldset>
                
                <div class="save-container">
                    <button type="button" id="download" class="save-btn">Save File</button>
                    <!--  if I add this to the crosspoint.local web interface, this button would save sleep.bmp directly to the root of the SD card  -->
                </div>
            </form>
        </main>

        <footer>Artisanally hand-coded by <a href="https://byanyothername.me/">Rose Liu</a> 👋</footer>

        <script src="script.js"></script>
    </body>
</html>
